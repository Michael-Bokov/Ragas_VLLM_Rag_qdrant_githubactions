name: RAG Quality Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: self-hosted  # используем ваш runner
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest requests datasets ragas langchain-huggingface langchain-ollama sentence-transformers

      - name: Start Docker services
        run: |
          docker-compose up -d
          # Даём время на загрузку моделей
          sleep 60

      - name: Run Ragas tests
        run: |
          pytest tests/test_rag_quality.py -s

      - name: Stop Docker services
        if: always()  # останавливаем даже при ошибке
        run: docker-compose down
      
      - name: Wait for vLLM to be ready
        run: |
          timeout 300 bash -c 'while [[ "$(curl -s -o /dev/null -w ''%{http_code}'' http://localhost:8000/health)" != "200" ]]; do sleep 5; done'
      
      # - name: Upload test results
      #   if: always()
